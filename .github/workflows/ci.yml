name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-against-localstack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app and test dependencies
        run: pip install -r app/requirements.txt -r requirements-dev.txt

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install tflocal
        run: pip install terraform-local

      - name: Install lstk CLI
        run: curl -Ls https://cli.localstack.cloud/lstk/install | sh

      # This single command starts LocalStack, resolves the project config for
      # my-prj-123, and installs/configures the LocalStack Extensions the app
      # needs (mock Stripe, Xero and Anthropic endpoints). No manual setup.
      - name: Start LocalStack project
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: lstk project start my-prj-123

      - name: Deploy to LocalStack
        run: make deploy-local

      - name: Run tests
        run: make test

      - name: Stop LocalStack project
        if: always()
        run: lstk project stop my-prj-123
