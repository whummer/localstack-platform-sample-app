# Generated by the LocalStack platform for project proj_261c6282.
# Re-run "Initialize repo" on the project in the platform to regenerate.
#
# Requires a LOCALSTACK_AUTH_TOKEN repository secret (Settings -> Secrets):
# use a CI key from https://app.localstack.cloud/workspace/auth-tokens
name: LocalStack CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the lstk CLI
        run: npm install -g @localstack/lstk

      - name: Install lstk-project
        run: pip install "https://localstack-artifacts-internal.s3.eu-central-1.amazonaws.com/packages/lstk-project/lstk_project-0.1.0-py3-none-any.whl"

      - name: Start LocalStack for project proj_261c6282
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: lstk-project start proj_261c6282

      # Runs the project's configured IaC deploy command (Terraform/CDK/...,
      # set on the project in the platform) — a no-op if none is configured.
      - name: Deploy infrastructure
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: lstk-project deploy proj_261c6282

      # ── Replace this placeholder with your project's real test command ────
      - name: Run tests (placeholder)
        run: |
          echo "TODO: replace with your test command (e.g. make test)"
          curl -sf localhost:4566/_localstack/health

      # Runs even if earlier steps failed. Saves a Cloud Pod first if the
      # project has that enabled, then tears the LocalStack container down.
      - name: Stop LocalStack for project proj_261c6282
        if: always()
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: lstk-project stop proj_261c6282
